<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <header>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Student Dashboard</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <section>
      <div class="d-flex justify-content-between align-items-center p-3">
        <h3 class="p-3 text-primary">Daftar Nilai Siswa</h3>
        <form class="d-flex" role="search">
          <input class="form-control me-2" type="search" placeholder="Cari Data Siswa..." aria-label="Search"
            id="cari" />
          <button class="btn btn-success" type="submit">Cari</button>
        </form>
      </div>
    </section>

    <section>
      <table class="table table-striped px-3">
        <thead>
          <tr>
            <th>No.</th>
            <th>Nama Siswa</th>
            <th>Kelas</th>
            <th>Nilai</th>
          </tr>
        </thead>

        <tbody id="dataSiswa"></tbody>
      </table>

      <div class="text-end p-3">Rata-rata Nilai Kelas: <span id="rataRata"></span></div>
    </section>
  </div>


  <script src="index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
